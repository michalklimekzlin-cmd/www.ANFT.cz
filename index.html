/* ======================================================

ANIMACE OKNA

====================================================== */

function updateWindow(){

const k=.12;

WINDOW_ENGINE.alpha+=
(WINDOW_ENGINE.targetAlpha-
WINDOW_ENGINE.alpha)*k;

WINDOW_ENGINE.scale+=
(WINDOW_ENGINE.targetScale-
WINDOW_ENGINE.scale)*k;

}

/* ======================================================

OTEVŘENÍ

====================================================== */

function showWindow(){

WINDOW_ENGINE.visible=true;

WINDOW_ENGINE.targetAlpha=1;

WINDOW_ENGINE.targetScale=1;

}

/* ======================================================

ZAVŘENÍ

====================================================== */

function hideWindow(){

WINDOW_ENGINE.targetAlpha=0;

WINDOW_ENGINE.targetScale=.85;

}
/* ======================================================

VaFiT WINDOW RENDERER
v2.0

====================================================== */

function drawWindow(){

if(!WINDOW_ENGINE.visible)return;

updateWindow();

if(WINDOW_ENGINE.alpha<0.01){

WINDOW_ENGINE.visible=false;

return;

}

/* ---------- ZATMAVENÍ ---------- */

ctx.save();

ctx.globalAlpha=
WINDOW_ENGINE.alpha*.55;

ctx.fillStyle="#000";

ctx.fillRect(
0,
0,
width,
height
);

ctx.restore();

/* ---------- STŘED OKNA ---------- */

const w=
WINDOW_ENGINE.width;

const h=
WINDOW_ENGINE.height;

const x=
WORLD.centerX-w/2;

const y=
WORLD.centerY-h/2;

ctx.save();

ctx.globalAlpha=
WINDOW_ENGINE.alpha;

ctx.translate(
WORLD.centerX,
WORLD.centerY
);

ctx.scale(
WINDOW_ENGINE.scale,
WINDOW_ENGINE.scale
);

ctx.translate(
-WINDOW_ENGINE.width/2,
-WINDOW_ENGINE.height/2
);

/* ---------- STÍN ---------- */

ctx.shadowColor=
WINDOW_ENGINE.shadow;

ctx.shadowBlur=28;

/* ---------- PANEL ---------- */

ctx.beginPath();

ctx.roundRect(

0,

0,

w,

h,

WINDOW_ENGINE.radius

);

ctx.fillStyle=
WINDOW_ENGINE.background;

ctx.fill();

ctx.lineWidth=2;

ctx.strokeStyle=
WINDOW_ENGINE.border;

ctx.stroke();

ctx.shadowBlur=0;

/* ---------- HORNÍ LIŠTA ---------- */

ctx.fillStyle=
"rgba(255,205,120,.12)";

ctx.beginPath();

ctx.roundRect(

0,

0,

w,

52,

[22,22,0,0]

);

ctx.fill();

/* ---------- NADPIS ---------- */

ctx.font=
"bold 18px system-ui";

ctx.fillStyle=
WINDOW_ENGINE.text;

ctx.textAlign="center";

ctx.textBaseline="middle";

ctx.fillText(

DIALOG.title,

w/2,

26

);

/* ---------- ODDĚLOVAČ ---------- */

ctx.strokeStyle=
"rgba(255,205,120,.35)";

ctx.beginPath();

ctx.moveTo(

18,

52

);

ctx.lineTo(

w-18,

52

);

ctx.stroke();

ctx.restore();

}

};

/* ------------------------------------------------ */

function executeSlot(slot){

    if(!slot)return;

    switch(slot.action){

        case SLOT_ACTIONS.OPEN:

            if(slot.url){

                window.open(slot.url,"_blank");

            }

        break;

        case SLOT_ACTIONS.STORE:

            activateSlot(slot);

        break;

        default:

            activateSlot(slot);

        break;

    }

}

v1.0

canvas.addEventListener("click", (e) => {

const rect = canvas.getBoundingClientRect();

const mouseX = e.clientX - rect.left;

const mouseY = e.clientY - rect.top;

/* Ověření kliknutí na nějaký slot */

ENGINE.spheres.forEach(sphere => {

sphere.slots.forEach(slot => {

const dx = mouseX - slot.screenX;

const dy = mouseY - slot.screenY;

const distance = Math.sqrt(dx*dx + dy*dy);

if(distance < 25){

executeSlot(slot);

}

});

});

});

canvas.addEventListener("contextmenu", (e) => {

e.preventDefault();

const rect = canvas.getBoundingClientRect();

const mouseX = e.clientX - rect.left;

const mouseY = e.clientY - rect.top;

ENGINE.spheres.forEach(sphere => {

sphere.slots.forEach(slot => {

const dx = mouseX - slot.screenX;

const dy = mouseY - slot.screenY;

const distance = Math.sqrt(dx*dx + dy*dy);

if(distance < 25){

openSlotMenu(slot, mouseX, mouseY);

}

});

});

});

document.addEventListener("keydown", (e) => {

if(e.key === "Escape"){

closeSlotMenu();

hideWindow();

}

});

/* Následující frame */

}
