<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#020617">
<title>PNFT • Signal Core</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background: radial-gradient(circle at top, #050815, #020208);
  font-family: system-ui;
}

/* 🧠 levý horní roh */
#pnftCorner{
  position:fixed;
  top:10px;
  left:10px;
  font-size:12px;
  color:#ffd98d;
  opacity:0.8;
  padding:6px 10px;
  border:1px solid rgba(255,217,141,0.25);
  border-radius:8px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);
}

/* 🎯 canvas */
#sphere{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
}
</style>
</head>

<body>

<div id="pnftCorner">
🧠 PNFT NODE
</div>
  
<div id="viveCorner">
🌍 VIVE
</div>

<canvas id="sphere"></canvas>

<script>
const canvas = document.getElementById("sphere");
const ctx = canvas.getContext("2d");

let w,h,dpr;

function resize(){
  dpr = window.devicePixelRatio || 1;
  w = canvas.width = innerWidth * dpr;
  h = canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + "px";
  canvas.style.height = innerHeight + "px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener("resize",resize);

// 🧬 jednoduchá “písmenková koule”
const chars = "PNFTVIVEGLYPH0123456789";

const points = [];
const R = 140;

for(let i=0;i<220;i++){
  const a = Math.random()*Math.PI*2;
  const b = Math.random()*Math.PI;
  points.push({
    x: Math.sin(b)*Math.cos(a),
    y: Math.cos(b),
    z: Math.sin(b)*Math.sin(a),
    c: chars[Math.floor(Math.random()*chars.length)]
  });
}

let rot = 0;

function draw(){
  ctx.clearRect(0,0,innerWidth,innerHeight);

  const cx = innerWidth/2;
  const cy = innerHeight/2;

  rot += 0.003;

  for(const p of points){

    let x = p.x;
    let z = p.z;

    // rotace
    let rx = x*Math.cos(rot) - z*Math.sin(rot);
    let rz = x*Math.sin(rot) + z*Math.cos(rot);

    const scale = R * (1 + rz*0.3);

    const sx = cx + rx * scale;
    const sy = cy + p.y * scale;

    const alpha = 0.3 + (rz+1)/2;

    ctx.fillStyle = `rgba(255,217,141,${alpha})`;
    ctx.font = "12px monospace";
    ctx.fillText(p.c, sx, sy);
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
