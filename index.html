<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#020617">
<title>PNFT • Signal Core</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background: radial-gradient(circle at top, #050815, #020208);
  font-family: system-ui;
}

/* 🧠 společný styl rohů */
.corner{
  position:fixed;
  top:10px;

  font-size:12px;
  padding:6px 10px;

  border-radius:8px;

  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(6px);

  opacity:0.85;
  z-index:10;

  user-select:none;
}

/* 🧠 PNFT NODE */
#pnftCorner{
  left:10px;
  color:#ffd98d;
  border:1px solid rgba(255,217,141,0.25);
}

/* 🌍 VIVE */
#viveCorner{
  right:10px;
  color:#8dd6ff;
  border:1px solid rgba(141,214,255,0.25);
}

/* 🎯 canvas */
#sphere{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
}
</style>
</head>

<body>

<!-- 🧠 LEVÝ UZEL -->
<div id="pnftCorner" class="corner">
🧠 PNFT NODE
</div>

<!-- 🌍 PRAVÝ UZEL -->
<div id="viveCorner" class="corner">
🌍 VIVE
</div>

<canvas id="sphere"></canvas>

<script>

const canvas = document.getElementById("sphere");
const ctx = canvas.getContext("2d");

let w,h,dpr;

function resize(){
  dpr = window.devicePixelRatio || 1;
  w = canvas.width = innerWidth * dpr;
  h = canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + "px";
  canvas.style.height = innerHeight + "px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener("resize",resize);

// 🧬 písmenková koule
const chars = "PNFTVIVEGLYPH0123456789";

const points = [];
const R = 140;

for(let i=0;i<220;i++){
  const a = Math.random()*Math.PI*2;
  const b = Math.random()*Math.PI;
  points.push({
    x: Math.sin(b)*Math.cos(a),
    y: Math.cos(b),
    z: Math.sin(b)*Math.sin(a),
    c: chars[Math.floor(Math.random()*chars.length)]
  });
}

let rot = 0;

// 📡 SIGNAL STATE (připraveno na SignalCore)
let signalActive = false;

function toggleSignal(){
  signalActive = !signalActive;

  document.getElementById("pnftCorner").style.opacity = signalActive ? "1" : "0.7";
  document.getElementById("viveCorner").style.opacity = signalActive ? "1" : "0.7";
}

canvas.addEventListener("click", toggleSignal);

// 🎨 RENDER
function draw(){

  ctx.clearRect(0,0,innerWidth,innerHeight);

  const cx = innerWidth/2;
  const cy = innerHeight/2;

  rot += 0.003;

  for(const p of points){

    let x = p.x;
    let z = p.z;

    let rx = x*Math.cos(rot) - z*Math.sin(rot);
    let rz = x*Math.sin(rot) + z*Math.cos(rot);

    const scale = R * (1 + rz*0.3);

    const sx = cx + rx * scale;
    const sy = cy + p.y * scale;

    const alpha = signalActive
      ? 0.6 + (rz+1)/2
      : 0.25 + (rz+1)/3;

    ctx.fillStyle = signalActive
      ? `rgba(0,229,255,${alpha})`
      : `rgba(255,217,141,${alpha})`;

    ctx.font = "12px monospace";
    ctx.fillText(p.c, sx, sy);
  }

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
