<title>VaFiT Core</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#020208;
}

/* rohy */
.corner{
  position:fixed;
  top:10px;
  font-size:12px;
  padding:6px 10px;
  border-radius:8px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,0.1);
}

#viveCorner{ left:10px; color:#8dffda; }
#fantasyCorner{ right:10px; color:#ffd98d; }

canvas{
  width:100%;
  height:100%;
  display:block;
}
</style>

</head>

<body>

<!-- 🌍 levý uzel -->
<div id="viveCorner" class="corner">🌍 VIVE</div>

<!-- ✨ pravý uzel -->
<div id="fantasyCorner" class="corner">✨ Tvá fantazie</div>

<canvas id="globe-canvas"></canvas>

<!-- MOST -->
<script src="./core/bridge.js"></script>

<!-- TVŮJ ENGINE -->
<script src="./engine/app.js"></script>
