function updateWindow(){

const k=.12;

WINDOW_ENGINE.alpha+=
(WINDOW_ENGINE.targetAlpha-
WINDOW_ENGINE.alpha)*k;

WINDOW_ENGINE.scale+=
(WINDOW_ENGINE.targetScale-
WINDOW_ENGINE.scale)*k;

}

OTEVŘENÍ

====================================================== */

WINDOW_ENGINE.visible=true;

WINDOW_ENGINE.targetScale=1;

WINDOW_ENGINE.targetAlpha=0;

WINDOW_ENGINE.targetScale=.85;

}
/* ======================================================

VaFiT WINDOW RENDERER
v2.0

====================================================== */

function drawWindow(){

if(!WINDOW_ENGINE.visible)return;

updateWindow();

if(WINDOW_ENGINE.alpha<0.01){

WINDOW_ENGINE.visible=false;

return;

}

/* ---------- ZATMAVENÍ ---------- */

ctx.save();

ctx.globalAlpha=
WINDOW_ENGINE.alpha*.55;

ctx.fillStyle="#000";

ctx.fillRect(
0,
0,
width,
height
);

ctx.restore();

/* ---------- STŘED OKNA ---------- */

const w=
WINDOW_ENGINE.width;

const h=
WINDOW_ENGINE.height;

const x=
WORLD.centerX-w/2;

const y=
WORLD.centerY-h/2;

ctx.save();

ctx.globalAlpha=
WINDOW_ENGINE.alpha;

ctx.translate(
WORLD.centerX,
WORLD.centerY
);

ctx.scale(
WINDOW_ENGINE.scale,
WINDOW_ENGINE.scale
);

ctx.translate(
-WINDOW_ENGINE.width/2,
-WINDOW_ENGINE.height/2
);

/* ---------- STÍN ---------- */

ctx.shadowColor=
WINDOW_ENGINE.shadow;

ctx.shadowBlur=28;

/* ---------- PANEL ---------- */

ctx.beginPath();

ctx.roundRect(

0,

0,

w,

h,

WINDOW_ENGINE.radius

);

ctx.fillStyle=
WINDOW_ENGINE.background;

ctx.fill();

ctx.lineWidth=2;

ctx.strokeStyle=
WINDOW_ENGINE.border;

ctx.stroke();

ctx.shadowBlur=0;

/* ---------- HORNÍ LIŠTA ---------- */

ctx.fillStyle=
"rgba(255,205,120,.12)";

ctx.beginPath();

ctx.roundRect(

0,

0,

w,

52,

[22,22,0,0]

);

ctx.fill();

"bold 18px system-ui";

ctx.fillStyle=
WINDOW_ENGINE.text;

ctx.textAlign="center";

ctx.textBaseline="middle";

ctx.fillText(

DIALOG.title,

w/2,

26

);

/* ---------- ODDĚLOVAČ ---------- */

ctx.strokeStyle=
"rgba(255,205,120,.35)";

ctx.beginPath();

ctx.moveTo(

18,

52

);

ctx.lineTo(

w-18,

52

);

ctx.stroke();

ctx.restore();

}

yy-11,

"#ffd88d";

item.icon,

24,

"#fff0c5";

);

}

ctx.restore();

}

    if(typeof hideWindow==="function"){

        hideWindow();

    }

    if(!WINDOW_ENGINE.visible){

        SLOT_RUNTIME.menu=false;

    }else{

        SLOT_RUNTIME.menu=true;

    updateRuntime();

    if(typeof drawWindow==="function"){

        drawWindow();

    }

    if(typeof drawWindowMenu==="function"){

        drawWindowMenu();

    }

    if(typeof drawSlotMenu==="function"){

        drawSlotMenu();

    }

    requestAnimationFrame(engineLoop);

}

activate:activateSlot,

};

/* ======================================================

VaF'i'T ENGINE LINK
v2.3

SMART SLOT ENGINE

====================================================== */

(function(){

const SLOT_ACTIONS={

OPEN:"open",

STORE:"store",

PWA:"pwa",

FILE:"file",

URL:"url",

HTML:"html",

IMAGE:"image",

VIDEO:"video",

AUDIO:"audio",

FOLDER:"folder",

PLUGIN:"plugin",

SETTINGS:"settings"

};

/* ------------------------------------------------ */

function executeSlot(slot){

    if(!slot)return;

    switch(slot.action){

        case SLOT_ACTIONS.OPEN:

            if(slot.url){

                window.open(slot.url,"_blank");

            }

        break;

        case SLOT_ACTIONS.STORE:

            if(typeof openSlotDialog==="function"){

                openSlotDialog(slot);

            }

            if(typeof showWindow==="function"){

                showWindow();

            }

        break;

        default:

            if(typeof openSlotDialog==="function"){

                openSlotDialog(slot);

            }

            if(typeof showWindow==="function"){

                showWindow();

            }

        break;

    }

}

/* ------------------------------------------------ */

window.VAFIT_RUNTIME.execute=executeSlot;

/* ------------------------------------------------ */

console.log(

"VaF'i'T Smart Slot Engine v2.3 načten."

);

})();

/* ======================================================

PŘIŘADIT APLIKACI SLOTU

====================================================== */

function assignAppToSlot(slot,app){

slot.app=app.id;

APP_ENGINE.apps[app.id]=app;

saveSlot(slot);

}

/* ======================================================

ODEBRAT APLIKACI ZE SLOTU

====================================================== */

function removeAppFromSlot(slot){

slot.app="";

saveSlot(slot);

}

/* ======================================================

NAJÍT APLIKACI

====================================================== */

function getApp(slot){

if(!slot.app)return null;

return APP_ENGINE.apps[slot.app];

}
/* ======================================================

VaF'i'T APP LAUNCHER
v1.1

====================================================== */

function launchSlot(slot){

APP_ENGINE.currentSlot=slot;

const app=getApp(slot);

if(!app){

openSlotDialog(slot);

showWindow();

return;

}

switch(app.type){

case "PWA":

launchPWA(app);

break;

case "URL":

launchURL(app);

break;

case "HTML":

launchHTML(app);

break;

case "IMAGE":

launchImage(app);

break;

case "VIDEO":

launchVideo(app);

break;

case "AUDIO":

launchAudio(app);

break;

case "FOLDER":

launchFolder(app);

break;

case "PLUGIN":

launchPlugin(app);

break;

case "AI":

launchAI(app);

break;

default:

openSlotDialog(slot);

showWindow();

}

}

const PWA_MANAGER={

version:"1.0",

installed:{},

running:{},

favorites:[]

};

/* ======================================================

REGISTRACE PWA

====================================================== */

function registerPWA(app){

if(!app)return;

PWA_MANAGER.installed[app.id]=app;

saveInstalledPWAs();

}

/* ======================================================

ODEBRÁNÍ PWA

====================================================== */

function unregisterPWA(id){

delete PWA_MANAGER.installed[id];

saveInstalledPWAs();

}

/* ======================================================

NAJÍT PWA

====================================================== */

function getPWA(id){

return PWA_MANAGER.installed[id];

}

/* ======================================================

ULOŽENÍ

====================================================== */

function saveInstalledPWAs(){

localStorage.setItem(

"VaFiT_PWA",

JSON.stringify(PWA_MANAGER.installed)

);

}

/* ======================================================

NAČTENÍ

====================================================== */

function loadInstalledPWAs(){

const data=

localStorage.getItem("VaFiT_PWA");

if(!data)return;

PWA_MANAGER.installed=

JSON.parse(data);

}

loadInstalledPWAs();
/* ======================================================

PŘIPOJENÍ PWA KE SLOTU

====================================================== */

function connectPWA(slot,app){

assignAppToSlot(slot,app);

registerPWA(app);

slot.type="PWA";

saveSlot(slot);

}
/* ======================================================

ODPOJENÍ PWA

====================================================== */

function disconnectPWA(slot){

if(!slot.app)return;

unregisterPWA(slot.app);

removeAppFromSlot(slot);

}
/* ======================================================

MÁ SLOT PWA?

====================================================== */

function slotHasPWA(slot){

return slot.app!=="";

}

/* ======================================================

OTEVŘÍT KARTU

====================================================== */

function openBrowserTab(address="VaFiT://home"){

const tab=createBrowserTab();

tab.address=address;

BROWSER.tabs.push(tab);

BROWSER.currentTab=

BROWSER.tabs.length-1;

}

/* ======================================================

ZAVŘÍT KARTU

====================================================== */

function closeBrowserTab(index){

if(index<0)return;

if(index>=BROWSER.tabs.length)return;

BROWSER.tabs.splice(index,1);

if(BROWSER.currentTab>=BROWSER.tabs.length)

BROWSER.currentTab=

Math.max(0,BROWSER.tabs.length-1);

}

/* ======================================================

PRVNÍ KARTA

====================================================== */

if(BROWSER.tabs.length===0){

openBrowserTab();

}
